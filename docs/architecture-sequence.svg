<svg viewBox="0 0 980 640" width="1960" height="1280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>Agentic SDLC interaction sequence</title>
  <rect x="0" y="0" width="980" height="640" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>
  <rect x="20" y="88" width="170" height="54" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="105" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">backlog.json</text>
  <text x="105" y="128" text-anchor="middle" font-size="11" fill="#475569">projects-config/&lt;name&gt;/</text>
  <rect x="20" y="180" width="170" height="46" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="105" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">make seed</text>
  <text x="105" y="216" text-anchor="middle" font-size="11" fill="#475569">one-off loader</text>
  <rect x="20" y="290" width="170" height="88" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="105" y="314" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">MCP delivery store</text>
  <text x="105" y="332" text-anchor="middle" font-size="11" fill="#475569">backlog · sprints · incidents</text>
  <text x="105" y="348" text-anchor="middle" font-size="11" fill="#475569">deploys · tokens · audit</text>
  <text x="105" y="366" text-anchor="middle" font-size="11" fill="#1e40af">append-only · role tokens</text>
  <path d="M105 142 L105 180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M105 226 L105 290" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="115" y="262" font-size="11" fill="#334155">⓪ load items</text>
  <rect x="270" y="88" width="180" height="480" rx="10" fill="#fff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="360" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Orchestrator</text>
  <text x="360" y="129" text-anchor="middle" font-size="11" fill="#475569">resumable batch job</text>
  <rect x="285" y="146" width="150" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="360" y="167" text-anchor="middle" font-size="12" fill="#78350f">risk assessor ✦</text>
  <rect x="285" y="188" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="360" y="209" text-anchor="middle" font-size="12" fill="#0f172a">sprint packer</text>
  <rect x="285" y="240" width="150" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="360" y="261" text-anchor="middle" font-size="12" fill="#78350f">coder ✦</text>
  <rect x="285" y="282" width="150" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="360" y="303" text-anchor="middle" font-size="12" fill="#78350f">code reviewer ✦</text>
  <rect x="285" y="324" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="360" y="345" text-anchor="middle" font-size="12" fill="#0f172a">verify + label</text>
  <rect x="285" y="366" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="360" y="387" text-anchor="middle" font-size="12" fill="#0f172a">preprod CI</text>
  <rect x="285" y="408" width="150" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="360" y="429" text-anchor="middle" font-size="12" fill="#78350f">approver ✦ + gate</text>
  <rect x="285" y="460" width="150" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="360" y="481" text-anchor="middle" font-size="12" fill="#78350f">release manager ✦</text>
  <rect x="285" y="514" width="150" height="34" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="360" y="535" text-anchor="middle" font-size="12" fill="#0f172a">monitor + resolver</text>
  <path d="M190 320 L270 320" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrB)" marker-start="url(#arrB)"/>
  <text x="196" y="310" font-size="11" fill="#1e40af">① read items · write</text>
  <text x="196" y="338" font-size="11" fill="#1e40af">status, audit, tokens</text>
  <rect x="560" y="146" width="180" height="270" rx="10" fill="#f8fafc" stroke="#334155"/>
  <text x="650" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">GitHub</text>
  <text x="650" y="187" text-anchor="middle" font-size="11" fill="#475569">governed repo · the artifact</text>
  <rect x="575" y="200" width="150" height="34" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="650" y="221" text-anchor="middle" font-size="12" fill="#0f172a">pull request</text>
  <rect x="575" y="244" width="150" height="46" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="650" y="263" text-anchor="middle" font-size="11" fill="#0f172a">review + CI + dossier</text>
  <text x="650" y="279" text-anchor="middle" font-size="11" fill="#475569">bot comments (marked)</text>
  <rect x="575" y="300" width="150" height="46" rx="6" fill="#fff7ed" stroke="#d97706"/>
  <text x="650" y="319" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">/approve comment</text>
  <text x="650" y="335" text-anchor="middle" font-size="11" fill="#92400e">allowlisted login only</text>
  <rect x="575" y="364" width="150" height="34" rx="6" fill="#fff" stroke="#94a3b8"/>
  <text x="650" y="385" text-anchor="middle" font-size="12" fill="#0f172a">merge to main</text>
  <path d="M435 257 L575 217" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="452" y="228" font-size="11" fill="#334155">② branch + push → PR</text>
  <path d="M435 299 L575 267" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text x="452" y="296" font-size="11" fill="#334155">③ review ⇄ fix loop</text>
  <path d="M435 383 L575 283" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <path d="M435 428 L575 323" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrA)"/>
  <text x="447" y="372" font-size="11" fill="#92400e">⑤ gate polls decision</text>
  <path d="M435 477 L575 384" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="452" y="448" font-size="11" fill="#334155">⑥ merge + traffic shift</text>
  <rect x="790" y="146" width="170" height="66" rx="10" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="875" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">Human approver</text>
  <text x="875" y="188" text-anchor="middle" font-size="11" fill="#92400e">HITL — identity checked</text>
  <text x="875" y="203" text-anchor="middle" font-size="11" fill="#92400e">at the source (GitHub)</text>
  <path d="M850 212 C 830 260, 780 295, 730 313" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrA)"/>
  <text x="760" y="252" font-size="11" fill="#92400e">④ reads dossier,</text>
  <text x="760" y="267" font-size="11" fill="#92400e">comments /approve</text>
  <rect x="790" y="380" width="170" height="110" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="875" y="404" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Cloud Run</text>
  <text x="875" y="422" text-anchor="middle" font-size="11" fill="#047857">live governed service</text>
  <text x="875" y="440" text-anchor="middle" font-size="11" fill="#047857">pr-N tagged revisions (0%)</text>
  <text x="875" y="458" text-anchor="middle" font-size="11" fill="#047857">traffic shift on release</text>
  <path d="M435 394 C 620 440, 700 430, 790 430" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="580" y="452" font-size="11" fill="#047857">deploy tag + smoke test</text>
  <path d="M435 531 C 620 560, 760 500, 800 490" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="580" y="556" font-size="11" fill="#047857">⑦ probe live endpoints</text>
  <path d="M285 531 C 180 531, 105 480, 105 378" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrB)"/>
  <text x="120" y="470" font-size="11" fill="#1e40af">⑧ open/close</text>
  <text x="120" y="485" font-size="11" fill="#1e40af">incidents</text>
  <rect x="560" y="514" width="400" height="54" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="574" y="528" width="14" height="14" rx="3" fill="#fef3c7" stroke="#d97706"/>
  <text x="594" y="539" font-size="11" fill="#334155">✦ reasoning agent (LLM)</text>
  <rect x="574" y="546" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="594" y="557" font-size="11" fill="#334155">deterministic step</text>
  <text x="760" y="539" font-size="11" fill="#92400e">— orange: human authority</text>
  <text x="760" y="557" font-size="11" fill="#1e40af">— blue: MCP store calls</text>
  <text x="360" y="76" text-anchor="middle" font-size="12" fill="#475569">steps run top → bottom per item; ⓪–⑧ = sequence</text>
</svg>
