# Project definition: candidate-app.
# Everything the engine needs to know about the governed project lives
# under config/candidate-app/; the engine itself is project-agnostic.

repo: amir707/candidate-app

cloud_run:
  service: candidate-app

# Deterministic module-to-area map (diff analysis assigns each file the
# area of its first matching prefix, else default_area).
areas:
  payments:
    - app/payments
  catalog:
    - app/catalog
default_area: core

# One representative endpoint per area: preprod smoke tests hit the
# changed area's endpoint; the synthetic monitor probes all of them.
smoke_endpoints:
  core: /health
  payments: /payments/summary
  catalog: /catalog/items
