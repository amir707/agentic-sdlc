# Common policy defaults shared by more than one step. A project may
# override any key at config/projects/<name>/sdlc_steps/policy.yaml.
# The test for what is policy: if it could change next quarter by team
# decision, it is policy — read by deterministic tools, referenced by
# prompts by NAME, values never copied into prose.

# Risk at or above this level must gate new behavior behind a feature
# flag. Consumers: code_reviewer (against risk as it stands at review
# time) and the verify step (against risk recomputed from the diff) —
# two deliberately independent checks.
flag_required_min_risk: medium
