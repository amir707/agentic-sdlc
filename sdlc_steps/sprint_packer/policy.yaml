# Sprint packing constraints (deterministic solver step).
# Override per project at
# projects-config/<name>/sdlc_steps/sprint_packer/policy.yaml.

# Risk budget in points: mediums cost 1, highs 2, cap 2 — so two
# mediums OR one high per sprint, never both.
risk_points:
  low: 0
  medium: 1
  high: 2
risk_budget: 2

# Token spend is sprint capacity: capacity planning for AI developers.
# Human-implemented items consume review capacity and risk points but
# zero tokens (different capacity pools, same risk pool).
token_budget: 140000

# Review bandwidth is the bottleneck agent fleets actually hit.
reviewer_capacity:
  reviewers: 3
  prs_per_reviewer: 2
